project_id = "handyman-saas"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[storage]
enabled = true
file_size_limit = "50MiB"

# Per-function config (global [functions] verify_jwt is invalid in newer CLI)
# Public signup — no user JWT yet
[functions.auth-register-customer]
verify_jwt = false

[functions.auth-register-provider]
verify_jwt = true

# Super Admin creates company admin via service role inside the function
[functions.auth-register-company-admin]
verify_jwt = true

[functions.auth-sign-in]
verify_jwt = false

[functions.auth-me]
verify_jwt = true

[functions.auth-forgot-password]
verify_jwt = false
